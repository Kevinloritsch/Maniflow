services:
  manim:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./docker/server.py:/app/server.py
    restart: unless-stopped

  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MANIM_API_URL=http://manim:5000
    depends_on:
      - manim
    restart: unless-stopped